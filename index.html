  const total = cat.nodes.length;[cite: 2]
  const angle = (idx * 2 * Math.PI / total) - Math.PI / 2;[cite: 2]
  const x = cat.centerX + cat.radius * Math.cos(angle);[cite: 2]
  const y = cat.centerY + cat.radius * Math.sin(angle);[cite: 2]
  return {x, y};[cite: 2]
}

function toggleVoteAtCoordinates(mx, my) {[cite: 2]
  const name = getVoterName();[cite: 2]
  if(!name) {[cite: 2]
    showFeedback('⚠️ Please type your name in the input field before casting map votes.');[cite: 2]
    return;[cite: 2]
  }
  
  const currentCategories = multiPagesData[activeViewPage];[cite: 2]
  
  for(let c = 0; c < currentCategories.length; c++) {[cite: 2]
    const cat = currentCategories[c];[cite: 2]
    for(let i = 0; i < cat.nodes.length; i++) {[cite: 2]
      const pos = getNodeCoordinates(cat, i);[cite: 2]
      if(Math.hypot(mx - pos.x, my - pos.y) < nodeRadius) {[cite: 2]
        const id = cat.nodes[i].id;[cite: 2]
        const index = selectionsByPage[activeViewPage].indexOf(id);[cite: 2]
        
        if(index > -1) {[cite: 2]
          selectionsByPage[activeViewPage].splice(index, 1);[cite: 2]
        } else {[cite: 2]
          if(selectionsByPage[activeViewPage].length >= 3) {[cite: 2]
            showFeedback(`🚫 Limit Exceeded: You can select a maximum of 3 votes on this page.`);[cite: 2]
            return;[cite: 2]
          }[cite: 2]
          selectionsByPage[activeViewPage].push(id);[cite: 2]
        }[cite: 2]
        updateUIControls();[cite: 2]
        draw();[cite: 2]
        return;[cite: 2]
      }
    }
  }
}

function showFeedback(text) {[cite: 2]

  msg.textContent = text;[cite: 2]

}

function submitAllVotes() {[cite: 2]
  const name = getVoterName();[cite: 2]
  if(!name) return;[cite: 2]
  
  const submitBtn = document.getElementById('submit-btn');[cite: 2]
  submitBtn.disabled = true;[cite: 2]
  showFeedback('📡 Sending votes to Google Sheets...');[cite: 2]

  let clearTextLabels = [];[cite: 2]
  
  for (let p in selectionsByPage) {[cite: 2]
    let prefix = (p == 1) ? "[Problem] " : (p == 2) ? "[Suggestion] " : "[Culture/Strength] ";[cite: 2]
    selectionsByPage[p].forEach(id => {[cite: 2]
      for(let c = 0; c < multiPagesData[p].length; c++){[cite: 2]
        let found = multiPagesData[p][c].nodes.find(n => n.id === id);[cite: 2]
        if(found) clearTextLabels.push(prefix + found.label.replace('\n',' '));[cite: 2]
      }
    });
  }

  const payload = {[cite: 2]
    name: name,[cite: 2]
    votes: clearTextLabels[cite: 2]
  };[cite: 2]

  fetch(GOOGLE_SHEET_URL, {[cite: 2]
    method: "POST",[cite: 2]
    mode: "no-cors", [cite: 2]
    cache: "no-cache",[cite: 2]
    headers: { "Content-Type": "application/json" },[cite: 2]
    body: JSON.stringify(payload)[cite: 2]
  })[cite: 2]
  .then(() => {[cite: 2]
    selectionsByPage = { 1: [], 2: [], 3: [] };[cite: 2]
    document.getElementById('voter-name').value = '';[cite: 2]
    showFeedback('✅ Success! Your responses have been pushed straight into your Google Sheet.');[cite: 2]
    updateUIControls();[cite: 2]
    navigatePage(-(activeViewPage - 1)); [cite: 2]
  })[cite: 2]
  .catch(error => {[cite: 2]
    console.error("Error sending data:", error);[cite: 2]
    showFeedback('❌ Error saving votes. Please check network connection.');[cite: 2]
    submitBtn.disabled = false;[cite: 2]
  });[cite: 2]
}

function draw() {[cite: 2]
  ctx.clearRect(0,0,W,H);[cite: 2]
  
  const activeCategories = multiPagesData[activeViewPage];[cite: 2]
  
  activeCategories.forEach(cat => {[cite: 2]
    if (activeViewPage > 1 && cat.theme === "WorkflowProcess") {[cite: 2]
       cat.centerY = 300;[cite: 2]
       cat.radius = 135;[cite: 2]
    }[cite: 2]
    
    const col = PALETTE[cat.theme];[cite: 2]
    const totalNodes = cat.nodes.length;[cite: 2]
    
    ctx.save();[cite: 2]
    ctx.beginPath();[cite: 2]
    ctx.arc(cat.centerX, cat.centerY, cat.radius, 0, Math.PI*2);[cite: 2]
    ctx.strokeStyle = col.fill + '28';[cite: 2]
    ctx.lineWidth = 3;[cite: 2]
    ctx.setLineDash([6, 5]);[cite: 2]
    ctx.stroke();[cite: 2]
    ctx.restore();[cite: 2]
    
    cat.connections.forEach(([fromIdx, toIdx]) => {[cite: 2]
      if(fromIdx < totalNodes && toIdx < totalNodes) {[cite: 2]
        const pA = getNodeCoordinates(cat, fromIdx);[cite: 2]
        const pB = getNodeCoordinates(cat, toIdx);[cite: 2]
        ctx.save();[cite: 2]
        ctx.beginPath();[cite: 2]
        ctx.moveTo(pA.x, pA.y);[cite: 2]
        ctx.lineTo(pB.x, pB.y);[cite: 2]
        ctx.strokeStyle = col.fill + '44';[cite: 2]
        ctx.lineWidth = 2;[cite: 2]
        ctx.setLineDash([4, 4]);[cite: 2]
        ctx.stroke();[cite: 2]
        ctx.restore();[cite: 2]
      }[cite: 2]
    });[cite: 2]

    cat.nodes.forEach((node, i) => {[cite: 2]
      const pos = getNodeCoordinates(cat, i);[cite: 2]
      const isSelected = selectionsByPage[activeViewPage].includes(node.id);[cite: 2]
      
      ctx.save();[cite: 2]
      ctx.beginPath();[cite: 2]
      ctx.arc(pos.x, pos.y, nodeRadius, 0, Math.PI*2);[cite: 2]
      ctx.fillStyle = isSelected ? col.fill : col.light;[cite: 2]
      ctx.fill();[cite: 2]
      ctx.strokeStyle = col.fill;[cite: 2]
      ctx.lineWidth = isSelected ? 3.5 : 1.5;[cite: 2]
      ctx.stroke();[cite: 2]
      ctx.restore();[cite: 2]
      
      if(node.priority > 0) {[cite: 2]
        const bx = pos.x + nodeRadius * 0.75;[cite: 2]
        const by = pos.y - nodeRadius * 0.75;[cite: 2]
        ctx.save();[cite: 2]
        ctx.beginPath();[cite: 2]
        ctx.arc(bx, by, 9, 0, Math.PI*2);[cite: 2]
        ctx.fillStyle = "#241E46";[cite: 2]
        ctx.fill();[cite: 2]
        ctx.font = "700 11px 'Jost', sans-serif";[cite: 2]
        ctx.fillStyle = "#fff";[cite: 2]
        ctx.textAlign = "center";[cite: 2]
        ctx.textBaseline = "middle";[cite: 2]
        ctx.fillText(node.priority, bx, by + 0.5);[cite: 2]
        ctx.restore();[cite: 2]
      }[cite: 2]
      
      if(isSelected) {[cite: 2]
        const cx = pos.x - nodeRadius * 0.75;[cite: 2]
        const cy = pos.y - nodeRadius * 0.75;[cite: 2]
        ctx.save();[cite: 2]
        ctx.beginPath();[cite: 2]
        ctx.arc(cx, cy, 9, 0, Math.PI*2);[cite: 2]
        ctx.fillStyle = "#63C3D1";[cite: 2]
        ctx.fill();[cite: 2]
        ctx.font = "700 11px 'Jost', sans-serif";[cite: 2]
        ctx.fillStyle = "#fff";[cite: 2]
        ctx.textAlign = "center";[cite: 2]
        ctx.textBaseline = "middle";[cite: 2]
        ctx.fillText("✓", cx, cy + 0.5);[cite: 2]
        ctx.restore();[cite: 2]
      }[cite: 2]
      
      const lines = node.label.split('\n');[cite: 2]
      ctx.save();[cite: 2]
      ctx.font = "700 10px 'Jost', sans-serif"; [cite: 2]
      ctx.textAlign = 'center';[cite: 2]
      ctx.textBaseline = 'middle';[cite: 2]
      ctx.fillStyle = isSelected ? '#fff' : '#241E46';[cite: 2]
      
      const lh = 13;[cite: 2]
      const sy = pos.y - (lines.length - 1) * lh / 2;[cite: 2]
      lines.forEach((ln, idx) => ctx.fillText(ln, pos.x, sy + idx * lh));[cite: 2]
      ctx.restore();[cite: 2]
    });[cite: 2]
  });[cite: 2]
}[cite: 2]

const tip = document.getElementById('tip');[cite: 2]
canvas.addEventListener('mousemove', e => {[cite: 2]
  const rect = canvas.getBoundingClientRect();[cite: 2]
  const mx = e.clientX - rect.left;[cite: 2]
  const my = e.clientY - rect.top;[cite: 2]
  
  const activeCategories = multiPagesData[activeViewPage];[cite: 2]
  let hoveredNode = null;[cite: 2]
  let hoveredCat = null;[cite: 2]
  let hoveredIndex = -1;[cite: 2]
  
  for(let c = 0; c < activeCategories.length; c++) {[cite: 2]
    const cat = activeCategories[c];[cite: 2]
    for(let i = 0; i < cat.nodes.length; i++) {[cite: 2]
      const pos = getNodeCoordinates(cat, i);[cite: 2]
      if(Math.hypot(mx - pos.x, my - pos.y) < nodeRadius) {[cite: 2]
        hoveredNode = cat.nodes[i];[cite: 2]

        hoveredIndex = i;[cite: 2]

    tip.innerHTML = `
      <strong>${hoveredNode.label.replace('\n',' ')}</strong>
      <div class="tip-owner">By: ${hoveredNode.owner} ${hoveredNode.priority > 0 ? '· Priority Level: ' + hoveredNode.priority : ''}</div>
      <div style="color:rgba(255,255,255,0.9); font-size:12px; margin-top:3px; text-align: left;">${hoveredNode.desc}</div>

});
